comic: scroggins-manson

style_brief: >
  Simplified colors and shading. Prefer iconic shape selection and silhouette over
  detailed line work or rendered texture. Figures and environments should read as
  clear, simplified forms — pop sensibility, not painterly realism.
  Bold black outlines. Flat or near-flat color fills with minimal gradation.
  Strong graphic shapes doing the work that rendering would otherwise do.
  Avoid cinematic naturalism, detailed texture, portrait realism, and illustrated-memoir rendering.
  The image should feel designed, not rendered.

